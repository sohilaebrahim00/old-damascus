<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>View Menu Screenshots</title>
  <style>
    body { font-family: sans-serif; background: #f0f0f0; margin: 20px; }
    h1 { color: #333; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .card { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
    .card img { max-width: 100%; height: auto; border: 1px solid #ccc; border-radius: 4px; }
    .card p { margin-top: 10px; font-weight: bold; font-size: 14px; }
  </style>
</head>
<body>
  <h1>Menu Screenshots Gallery</h1>
  <div class="grid">
    <div class="card">
      <img src="client-assets/drop/menu-source/Screenshot 2026-07-06 023038.png" alt="Screenshot 1">
      <p>Screenshot 2026-07-06 023038.png</p>
    </div>
    <div class="card">
      <img src="client-assets/drop/menu-source/Screenshot 2026-07-06 023154.png" alt="Screenshot 2">
      <p>Screenshot 2026-07-06 023154.png</p>
    </div>
    <div class="card">
      <img src="client-assets/drop/menu-source/Screenshot 2026-07-06 023210.png" alt="Screenshot 3">
      <p>Screenshot 2026-07-06 023210.png</p>
    </div>
    <div class="card">
      <img src="client-assets/drop/menu-source/Screenshot 2026-07-06 023224.png" alt="Screenshot 4">
      <p>Screenshot 2026-07-06 023224.png</p>
    </div>
    <div class="card">
      <img src="client-assets/drop/menu-source/Screenshot 2026-07-06 023238.png" alt="Screenshot 5">
      <p>Screenshot 2026-07-06 023238.png</p>
    </div>
    <div class="card">
      <img src="client-assets/drop/menu-source/Screenshot 2026-07-06 023252.png" alt="Screenshot 6">
      <p>Screenshot 2026-07-06 023252.png</p>
    </div>
  </div>
</body>
</html>
